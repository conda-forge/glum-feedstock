context:
  name: glum
  version: "3.2.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 5612b3ebff44e826b6f1e1363885cbf02dab70415d1677fa9942c917b61b27a6


build:
  number: 0
  skip: python_impl == "pypy"
  script:
    content: python -m pip install . -vv
    env:
      GLM_ARCHITECTURE: default

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - cython
        - numpy
    - ${{ compiler("c") }}
    - ${{ stdlib("c") }}
    - ${{ compiler("cxx") }}
    - if: osx
      then:
        - llvm-openmp
    - if: linux
      then:
        - libgomp
  host:
    - python
    - cython
    - if: osx
      then:
        - llvm-openmp
    - numpy
    - pip
    - scikit-learn >=0.23
    - setuptools
    - setuptools-scm
  run:
    - python
    - formulaic >=1.2.0
    - joblib
    - narwhals >=2.0.0
    - numexpr
    - numpy >=1.24
    - packaging
    - pandas >=1.4
    - pyarrow
    - scikit-learn >=1.1.0
    - scipy >=1.8.0
    - tabmat >=4.1.5
    - tqdm

tests:
  - python:
      pip_check: true
      imports:
        - glum

about:
  homepage: https://github.com/quantco/glum
  license: BSD-3-Clause
  license_file: LICENSE
  summary: High performance Python GLMs with all the features!
  description: |
    glum is a fast and feature-complete GLM estimator. It supports built-in
    cross-validation, exploiting regularization path, L1 and L2 regularization
    with Tikhonov penalties, sample weights, offsets, linear inequality constraints,
    and more!
  documentation: https://glum.readthedocs.io
  repository: https://github.com/quantco/glum

extra:
  recipe-maintainers:
    - MatthiasSchmidtblaicherQC
    - MarcAntoineSchmidtQC
    - xhochy
    - stanmart
    - janjagusch
    - jtilly
